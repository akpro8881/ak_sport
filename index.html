<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AK Sport</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- القائمة التي ستحتوي على جميع القنوات -->
   <input type="text" id="searchBox" placeholder="ابحث عن قناة...">
<div id="list"></div>

    <!-- قالب العنصر (Custom View) -->
    <template id="channelTemplate">

        <div class="item">

            <img class="channel-image">

            <h3 class="channel-name"></h3>

            <p class="channel-category"></p>

            <button class="play-btn">
                تشغيل
            </button>

        </div>

    </template>

    <script type="module" src="script.js"></script>

</body>

</html>
